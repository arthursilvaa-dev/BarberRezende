name: Deploy to MonsterASP

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: dotnet publish BarberRezende.API/BarberRezende.API.csproj -c Release -o ./publish

      - name: Colocar app offline (liberar DLLs)
        run: |
          mkdir -p ./.offline
          echo "<html><body>Atualizando, volte em instantes...</body></html>" > ./.offline/app_offline.htm
          curl -s ftp://${{ secrets.FTP_SERVER }}/wwwroot/ \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -T ./.offline/app_offline.htm \
            ftp://${{ secrets.FTP_SERVER }}/wwwroot/app_offline.htm

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          state-name: .ftp-deploy-sync-state.json

      - name: Remover app_offline.htm (reativar app)
        run: |
          curl -s ftp://${{ secrets.FTP_SERVER }}/wwwroot/ \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /wwwroot/app_offline.htm"
